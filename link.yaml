proxy-groups:
- name: 🚀 代理入口
  type: select
  proxies:
  - ♻️ 自动选择
  - 🇭🇰 香港节点
  - 🇸🇬 狮城节点
  - 🇯🇵 日本节点
  - 🇰🇷 韩国节点
  - 🔀 手动切换
  - DIRECT
- name: 🔀 手动切换
  include-all: true
  type: select
- name: ♻️ 自动选择
  type: url-test
  include-all: true
  interval: 300
  tolerance: 50
- name: 🇭🇰 香港节点
  include-all: true
  filter: (?i)港|HK|hk|Hong Kong|HongKong|hongkong
  type: url-test
  interval: 300
  tolerance: 50
- name: 🇸🇬 狮城节点
  include-all: true
  filter: (?i)新加坡|坡|狮城|SG|Singapore
  type: url-test
  interval: 300
  tolerance: 50
- name: 🇯🇵 日本节点
  include-all: true
  filter: (?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan
